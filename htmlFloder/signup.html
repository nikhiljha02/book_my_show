<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .signup-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 320px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .signup-container h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .signup-container input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      .signup-container button {
        width: 100%;
        padding: 10px;
        background: #4facfe;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }

      .signup-container button:hover {
        background: #007bff;
      }

      .signup-container p {
        text-align: center;
        margin-top: 15px;
      }

      .signup-container a {
        color: #4facfe;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <h2>Sign Up</h2>
      <form class="signupForm">
        <input type="text" id="name" placeholder="Full Name" required />
        <input type="email" placeholder="Email" required />
        <input
          type="password"
          class="firstPass"
          placeholder="Password"
          required
        />
        <input
          type="password"
          class="confirmPass"
          placeholder="Confirm Password"
          required
        />
        <button type="submit">Create Account</button>
      </form>
      <p>
        Already have an account?
        <a href="http://127.0.0.1:5500/htmlFloder/login.html">Login</a>
      </p>
    </div>

    <script>
      document
        .querySelector(".signupForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          let confirmPass = document.querySelector(".confirmPass").value;
          let firstPass = document.querySelector(".firstPass").value;

          if (firstPass.trim() !== confirmPass.trim()) {
            alert("password does not match");
            return;
          }

          const data = {
            name: document.getElementById("name").value,
            email: document.querySelector('[type="email"]').value,
            password: document.querySelector(".firstPass").value,
          };

          const response = await fetch("http://localhost:8080/auth/signup", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          const result = await response.json();
          // alert(result.message);
        });
    </script>
  </body>
</html>
